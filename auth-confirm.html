<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>이메일 인증 - 나는</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #F3F4F6;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                 "Malgun Gothic", "맑은 고딕", sans-serif;
    color: #1A1A1A;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: #FFFFFF;
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  .emoji { font-size: 52px; line-height: 1; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 800; margin: 0 0 12px; color: #111827; }
  p { font-size: 15px; font-weight: 500; line-height: 1.7; color: #4B5563; margin: 0 0 8px; }
  .btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 15px 20px;
    background: #2E86AB;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 800;
    text-decoration: none;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }
  .btn:active { opacity: 0.8; }
  .hint {
    margin-top: 18px;
    font-size: 13px;
    line-height: 1.6;
    color: #9CA3AF;
    font-weight: 500;
  }
  .err h1 { color: #B91C1C; }
  .hidden { display: none; }
</style>
</head>
<body>

  <!-- 성공 -->
  <div class="card" id="ok">
    <div class="emoji">🦦</div>
    <h1>이메일 인증이 완료되었습니다</h1>
    <p>아래 버튼을 눌러 앱으로 돌아가<br>로그인해 주세요.</p>
    <a class="btn" id="openApp" href="naneun://auth/confirm">앱으로 돌아가기</a>
    <div class="hint">
      버튼이 동작하지 않으면<br>휴대폰에서 <b>[나는]</b> 앱을 직접 열어 로그인해 주세요.
    </div>
  </div>

  <!-- 실패 -->
  <div class="card err hidden" id="ng">
    <div class="emoji">⏰</div>
    <h1>링크가 만료되었어요</h1>
    <p id="ngMsg">인증 링크는 일정 시간이 지나면 사용할 수 없습니다.</p>
    <p><b>[나는]</b> 앱에서 다시 로그인을 시도하시면<br>인증 메일을 다시 받을 수 있습니다.</p>
    <div class="hint">
      계속 문제가 생기면<br>naneun.help@gmail.com 으로 알려주세요.
    </div>
  </div>

<script>
(function () {
  // Supabase는 실패 시 #error=... 또는 ?error=... 형태로 알려준다.
  var hash   = (location.hash || "").replace(/^#/, "");
  var search = (location.search || "").replace(/^\?/, "");
  var params = new URLSearchParams(hash + "&" + search);

  var err = params.get("error") || params.get("error_code");

  if (err) {
    document.getElementById("ok").classList.add("hidden");
    document.getElementById("ng").classList.remove("hidden");
    var desc = params.get("error_description") || "";
    if (desc && /expired/i.test(desc)) {
      document.getElementById("ngMsg").textContent =
        "인증 링크가 만료되었습니다. 링크는 발송 후 일정 시간만 유효합니다.";
    }
  }
})();
</script>

</body>
</html>
