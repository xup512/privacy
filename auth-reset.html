<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>비밀번호 재설정 - 나는</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #F3F4F6;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                 "Malgun Gothic", "맑은 고딕", sans-serif;
    color: #1A1A1A;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: #FFFFFF;
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  .icon {
    width: 76px; height: 76px; border-radius: 18px;
    display: block; margin: 0 auto 18px; object-fit: cover;
  }
  .emoji { font-size: 48px; line-height: 1; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 800; margin: 0 0 12px; color: #111827; }
  p { font-size: 15px; font-weight: 500; line-height: 1.7; color: #4B5563; margin: 0 0 8px; }
  .field { text-align: left; margin-top: 14px; }
  label { display: block; font-size: 12px; color: #9A9A9A; font-weight: 700; margin-bottom: 6px; }
  input {
    width: 100%; height: 48px; border-radius: 12px;
    border: 1px solid #EAEAE6; padding: 0 14px;
    font-size: 15px; color: #1A1A1A; background: #FFFFFF;
    font-family: inherit;
  }
  input:focus { outline: none; border-color: #2E86AB; }
  .btn {
    display: block; width: 100%; margin-top: 22px; padding: 15px 20px;
    background: #2E86AB; color: #FFFFFF;
    font-size: 16px; font-weight: 800;
    text-decoration: none; border: none; border-radius: 12px;
    cursor: pointer; font-family: inherit;
  }
  .btn:active { opacity: 0.8; }
  .btn[disabled] { opacity: 0.55; cursor: default; }
  .err {
    font-size: 14px; color: #B91C1C; font-weight: 700;
    margin-top: 14px; text-align: left; line-height: 1.6;
  }
  .hint {
    margin-top: 18px; font-size: 13px; line-height: 1.6;
    color: #9CA3AF; font-weight: 500;
  }
  .hidden { display: none; }
</style>
</head>
<body>

  <!-- 1. 비밀번호 입력 -->
  <div class="card" id="viewForm">
    <img class="icon" id="appIcon" src="play_store_icon_512.png" alt="나는">
    <h1>새 비밀번호 설정</h1>
    <p>앞으로 사용하실 비밀번호를<br>입력해 주세요.</p>

    <div class="field">
      <label for="pw1">새 비밀번호 (8자 이상)</label>
      <input id="pw1" type="password" autocomplete="new-password" placeholder="8자 이상">
    </div>
    <div class="field">
      <label for="pw2">새 비밀번호 확인</label>
      <input id="pw2" type="password" autocomplete="new-password" placeholder="비밀번호 다시 입력">
    </div>

    <div class="err hidden" id="formErr"></div>

    <button class="btn" id="submitBtn" type="button">비밀번호 변경</button>
  </div>

  <!-- 2. 변경 완료 -->
  <div class="card hidden" id="viewDone">
    <img class="icon" id="appIcon2" src="play_store_icon_512.png" alt="나는">
    <h1>비밀번호가 변경되었습니다</h1>
    <p>앱으로 돌아가 새 비밀번호로<br>로그인해 주세요.</p>
    <a class="btn" href="naneun://">앱으로 돌아가기</a>
    <div class="hint">
      버튼이 동작하지 않으면<br>휴대폰에서 <b>[나는]</b> 앱을 직접 열어 주세요.
    </div>
  </div>

  <!-- 3. 링크 문제 -->
  <div class="card hidden" id="viewBad">
    <div class="emoji">⏰</div>
    <h1 style="color:#B91C1C;">링크가 만료되었어요</h1>
    <p id="badMsg">재설정 링크는 일정 시간이 지나면 사용할 수 없습니다.</p>
    <p><b>[나는]</b> 앱에서 <b>비밀번호 찾기</b>를 다시 눌러<br>새 링크를 받아 주세요.</p>
    <div class="hint">
      계속 문제가 생기면<br>naneun.help@gmail.com 으로 알려주세요.
    </div>
  </div>

<script>
(function () {
  "use strict";

  // ── 프로젝트별 공개키(anon). 공개 전제 키이므로 노출되어도 안전 ──
  var PROJECTS = {
    "lxbfvxlbaknluyhzyeei": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZ2eGxiYWtubHV5aHp5ZWVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MjQwNzksImV4cCI6MjA5NTAwMDA3OX0.so9UAS8BUHHdbfpVC3ZnOLmPgxnypr7-8RGtmxXh3no",
    "sfcwpkjlgheilafylluw": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmY3dwa2psZ2hlaWxhZnlsbHV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjA4MDcsImV4cCI6MjA5MTY5NjgwN30.jTWiRFFlRwJX-XGwA-mOOVAtAT3blIKy85EHEPyAJdA"
  };

  var $ = function (id) { return document.getElementById(id); };

  [$("appIcon"), $("appIcon2")].forEach(function (im) {
    if (im) { im.onerror = function () { im.style.display = "none"; }; }
  });

  function show(which) {
    ["viewForm", "viewDone", "viewBad"].forEach(function (v) {
      $(v).classList.toggle("hidden", v !== which);
    });
  }

  function showBad(msg) {
    if (msg) { $("badMsg").textContent = msg; }
    show("viewBad");
  }

  // ── URL에서 토큰 꺼내기 (#뒤 우선, ?뒤도 함께) ──
  var hash = (location.hash || "").replace(/^#/, "");
  var search = (location.search || "").replace(/^\?/, "");
  var params = new URLSearchParams(hash + "&" + search);

  if (params.get("error") || params.get("error_code")) {
    var d = params.get("error_description") || "";
    showBad(/expired/i.test(d)
      ? "재설정 링크가 만료되었습니다. 링크는 발송 후 일정 시간만 유효합니다."
      : null);
    return;
  }

  var accessToken = params.get("access_token");
  if (!accessToken) {
    showBad("링크가 올바르지 않습니다. 메일의 버튼을 다시 눌러 주세요.");
    return;
  }

  // ── 토큰 안의 발급처(iss)로 Dev/Prod 자동 판별 ──
  function refFromToken(t) {
    try {
      var seg = t.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
      seg += "====".slice(0, (4 - seg.length % 4) % 4);
      var claim = JSON.parse(atob(seg));
      var m = String(claim.iss || "").match(/\/\/([a-z0-9]+)\.supabase\.co/i);
      return m ? m[1] : null;
    } catch (e) { return null; }
  }

  var detected = refFromToken(accessToken);
  var candidates = (detected && PROJECTS[detected])
    ? [detected]
    : Object.keys(PROJECTS);   // 판별 실패 시 등록된 프로젝트를 차례로 시도

  // ── 비밀번호 변경 요청 ──
  function updatePassword(ref, newPw) {
    return fetch("https://" + ref + ".supabase.co/auth/v1/user", {
      method: "PUT",
      headers: {
        "apikey": PROJECTS[ref],
        "Authorization": "Bearer " + accessToken,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ password: newPw })
    });
  }

  var btn = $("submitBtn");
  var errBox = $("formErr");

  function setErr(msg) {
    errBox.textContent = msg;
    errBox.classList.toggle("hidden", !msg);
  }

  btn.addEventListener("click", function () {
    var pw1 = $("pw1").value;
    var pw2 = $("pw2").value;
    setErr("");

    if (pw1.length < 8) { setErr("비밀번호는 8자 이상이어야 해요."); return; }
    if (pw1 !== pw2) { setErr("비밀번호가 일치하지 않아요."); return; }

    btn.disabled = true;
    btn.textContent = "변경 중...";

    var i = 0;
    (function attempt() {
      if (i >= candidates.length) {
        btn.disabled = false;
        btn.textContent = "비밀번호 변경";
        showBad("링크가 만료되었거나 유효하지 않습니다.");
        return;
      }
      var ref = candidates[i++];

      updatePassword(ref, pw1).then(function (res) {
        if (res.ok) { show("viewDone"); return; }

        return res.json().catch(function () { return {}; }).then(function (body) {
          var m = String(body.msg || body.message || body.error_description || "");

          if (res.status === 401 || res.status === 403) { attempt(); return; }

          btn.disabled = false;
          btn.textContent = "비밀번호 변경";

          if (/should be different/i.test(m)) {
            setErr("이전과 다른 비밀번호를 입력해 주세요.");
          } else if (/rate limit|too many/i.test(m)) {
            setErr("잠시 후 다시 시도해 주세요.");
          } else if (/at least|weak|short/i.test(m)) {
            setErr("비밀번호는 8자 이상으로 입력해 주세요.");
          } else if (res.status === 422) {
            setErr("사용할 수 없는 비밀번호입니다. 다른 비밀번호를 입력해 주세요.");
          } else {
            setErr("오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
          }
        });
      }).catch(function () {
        btn.disabled = false;
        btn.textContent = "비밀번호 변경";
        setErr("네트워크 연결을 확인해 주세요.");
      });
    })();
  });

  $("pw2").addEventListener("keydown", function (e) {
    if (e.key === "Enter") { btn.click(); }
  });

  show("viewForm");
})();
</script>

</body>
</html>
